id: io.github.Arisotura.CoinKiller
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: CoinKiller
rename-desktop-file: io.github.ExplosBlue.CoinKiller.desktop
rename-icon: io.github.ExplosBlue.CoinKiller
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --share=ipc

modules:
  - name: CoinKiller
    buildsystem: qmake
    post-install:
      - install -Dm644 $FLATPAK_ID.metainfo.xml -t $FLATPAK_DEST/share/metainfo
    sources:
      - type: archive
        archive-type: tar-gzip
        url: https://api.github.com/repos/ExplosBlue/CoinKiller/tarball/Automated-2025-08-11
        sha256: ee815dfaeeef14089e42e856cef65325d8a3cfd0f8e86c12d172d4dccfaf9145
        x-checker-data:
          type: json
          url: https://api.github.com/repos/Arisotura/CoinKiller/releases/latest
          version-query: .published_at | split("T")[0]
          url-query: .tarball_url
          is-main-source: true
      - type: file
        path: io.github.Arisotura.CoinKiller.metainfo.xml
